<!DOCTYPE html>
<html>
    <head>
        <title>ML Predictor</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="container">
            <div class="card">
                <h2>Train Model</h2>
                <input type="file" id="csvFile" accept=".csv">
                <div class="form-row">
                    <label for="learningRate">Learning rate (scratch)</label>
                    <input id="learningRate" type="number" step="0.0001" value="0.01">
                </div>
                <div class="form-row">
                    <label for="iterations">Iterations (scratch)</label>
                    <input id="iterations" type="number" value="100">
                </div>
                <button id="trainBtn" onclick="train()">Train</button>
                <p id="trainResult" class="result"></p>
            </div>


            <div class="card">
                <h2>Predict</h2>
                <textarea id="inputData" rows="6">{"size":70,"rooms":3,"age":6}</textarea>
                <button id="predictBtn" onclick="predict()">Predict</button>

                <p id="predictResult" class="result"></p>

            </div>

        </div>


        <script src="scripts.js"></script>

    </body>
</html>
